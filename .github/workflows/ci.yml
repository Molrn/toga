name: CI
on:
  pull_request:
  push:
    branches:
      - main
  workflow_call:
    inputs:
      attest-package:
        description: "Create GitHub provenance attestation for the package."
        default: "false"
        type: string
    outputs:
      artifact-basename:
        description: "Base name of the uploaded artifacts; use for artifact retrieval."
        value: ${{ jobs.package.outputs.artifact-basename }}

env:
  min_python_version: "3.10"
  FORCE_COLOR: "1"
  SETUPTOOLS_SCM_PRETEND_VERSION: ${{ github.ref_name.replaceFirst('v', '') }}

defaults:
  run:
    shell: bash

# Cancel active CI runs for a PR before starting another run
concurrency:
  group: ${{ github.workflow}}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    name: Pre-commit checks
    uses: beeware/.github/.github/workflows/pre-commit-run.yml@main
    with:
      pre-commit-source: "--group pre-commit"

  package:
    name: Package Toga
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      attestations: write
    strategy:
      matrix:
        wheel:
        - "cocoa"
        - "core"
        - "gtk"
        - "toga"
        - "travertino"
        - "winforms"

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          repository: ${{ github.repository }}
          fetch-depth: 0  # Fetch all refs so setuptools_scm can generate the correct version number

      - name: Build Package & Upload Artifact
        id: package
        uses: hynek/build-and-inspect-python-package@v2.17.0
        with:
          path: ${{ matrix.subdir || matrix.wheel }}
          upload-name-suffix: ${{ format('-{0}', matrix.wheel) }}
          attest-build-provenance-github: ${{ inputs.attest-package }}

  travertino-backwards-compatibility:
    name: Test Travertino backwards compatibility with Toga 0.4.8
    runs-on: "ubuntu-latest"
    needs: [ pre-commit, package ]

    steps:
    - name: Checkout
      uses: actions/checkout@v6.0.2
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v6.2.0
      with:
        python-version: ${{ env.min_python_version }}

    - name: Install Tox
      run: python -m pip install --group tox-uv

    - name: Get Package
      uses: actions/download-artifact@v8.0.1
      with:
        pattern: "Packages-travertino"
        merge-multiple: true
        path: dist

    - name: Test
      run: |
        export TRAVERTINO_INSTALL_COMMAND="uv pip install ../$(ls dist/travertino-*.whl)"
        tox -e trav-compat
