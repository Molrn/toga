name: Create Release

on:
  push:
    tags:
      - 'v*'

env:
  SETUPTOOLS_SCM_PRETEND_VERSION: ${{ github.ref_name[1:] }}

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    with:
      attest-package: "true"

  release:
    name: Create GitHub release
    needs: [ ci ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Set Build Variables
        run: |
          echo "VERSION=${GITHUB_REF_NAME#v}" | tee -a $GITHUB_ENV

      - name: Get Packages
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: "Packages-*"
          merge-multiple: true
          path: dist

      - name: Create Release
        uses: ncipollo/release-action@v1.21.0
        with:
          name: ${{ env.VERSION }}
          draft: true
          artifacts: "dist/*"
          artifactErrorsFailBuild: true
